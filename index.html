<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#141312">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budżet">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<title>Budżet</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #141312;
  --bg-soft: #1c1a18;
  --surface: #24211e;
  --surface-2: #2d2925;
  --border: #38332e;
  --text: #f0ebe2;
  --text-muted: #908a7f;
  --text-dim: #5d5750;
  --accent: #d97757;
  --accent-soft: rgba(217, 119, 87, 0.15);
  --expense: #c4544b;
  --income: #6b9b6e;
  --warning: #d4a04a;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);

  --font-display: 'Fraunces', Georgia, serif;
  --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  font-size: 15px;
  line-height: 1.5;
  overflow: hidden;
  overscroll-behavior: none;
  height: 100vh;
  height: 100dvh;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; padding: 0; }
input, select, textarea { font-family: inherit; }

#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
}

#app-header {
  padding: calc(var(--safe-top) + 14px) 20px 14px;
  background: var(--bg);
  flex-shrink: 0;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}

.month-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.month-nav h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 24px;
  font-variation-settings: 'opsz' 48;
  letter-spacing: -0.01em;
  margin: 0;
  text-align: center;
  flex: 1;
}
.icon-btn {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  color: var(--text-muted);
  border-radius: var(--radius-sm);
  transition: background 0.15s;
  font-family: var(--font-display);
}
.icon-btn:active { background: var(--surface); }

#app-main {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 16px 20px calc(var(--safe-bottom) + 100px);
}

#bottom-nav {
  display: flex;
  justify-content: space-around;
  background: var(--bg-soft);
  border-top: 1px solid var(--border);
  padding: 8px 0 calc(var(--safe-bottom) + 8px);
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  max-width: 600px;
  margin: 0 auto;
  z-index: 5;
}
.nav-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 6px 12px;
  color: var(--text-dim);
  transition: color 0.2s;
  flex: 1;
}
.nav-btn.active { color: var(--accent); }
.nav-icon { width: 22px; height: 22px; display: block; }
.nav-label { font-size: 11px; font-weight: 600; letter-spacing: 0.02em; }

#fab {
  position: fixed;
  right: 20px;
  bottom: calc(var(--safe-bottom) + 76px);
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  color: var(--bg);
  font-size: 30px;
  font-weight: 400;
  font-family: var(--font-display);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 16px rgba(217, 119, 87, 0.4);
  transition: transform 0.15s;
  z-index: 6;
}
#fab:active { transform: scale(0.94); }

/* ----- Cards / summary ----- */
.summary-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 12px;
}
.summary-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
  margin-bottom: 6px;
}
.summary-amount {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 500;
  font-feature-settings: 'tnum';
  letter-spacing: -0.02em;
  line-height: 1.1;
}
.summary-amount.income { color: var(--income); }
.summary-amount.expense { color: var(--expense); }
.summary-amount.net.positive { color: var(--income); }
.summary-amount.net.negative { color: var(--expense); }

.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 10px;
}
.summary-grid .summary-card { margin-bottom: 0; padding: 14px 16px; }
.summary-grid .summary-amount { font-size: 19px; }

.section-title {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 18px;
  margin: 24px 0 12px;
  letter-spacing: -0.01em;
  font-variation-settings: 'opsz' 24;
}

/* Budget bars */
.budget-row {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 6px;
}
.budget-row-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
  gap: 10px;
}
.budget-name {
  font-weight: 600;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}
.budget-name-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.budget-amounts {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  white-space: nowrap;
  font-feature-settings: 'tnum';
}
.budget-amounts strong { color: var(--text); font-weight: 500; }
.budget-bar-track {
  height: 6px;
  background: var(--surface-2);
  border-radius: 3px;
  overflow: hidden;
}
.budget-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 3px;
  transition: width 0.4s ease;
}
.budget-bar-fill.over { background: var(--expense); }
.budget-bar-fill.warning { background: var(--warning); }

.cat-bullet {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Transaction list */
.day-group { margin-bottom: 20px; }
.day-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding: 0 4px 6px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 4px;
}
.day-date {
  font-family: var(--font-display);
  font-weight: 500;
  font-size: 15px;
  font-variation-settings: 'opsz' 24;
}
.day-total {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  font-feature-settings: 'tnum';
}
.txn-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 4px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  gap: 12px;
}
.txn-row:last-child { border-bottom: none; }
.txn-row:active { background: var(--surface); }
.txn-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}
.txn-category {
  font-weight: 500;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
}
.txn-category-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.txn-note {
  font-size: 12px;
  color: var(--text-muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding-left: 16px;
}
.txn-amount {
  font-family: var(--font-mono);
  font-weight: 500;
  font-size: 15px;
  font-feature-settings: 'tnum';
  white-space: nowrap;
}
.txn-amount.expense { color: var(--expense); }
.txn-amount.income { color: var(--income); }

.empty-state {
  text-align: center;
  padding: 80px 20px 40px;
  color: var(--text-muted);
}
.empty-state p { margin: 8px 0; font-size: 14px; }
.empty-state .big {
  font-size: 48px;
  font-family: var(--font-display);
  opacity: 0.3;
  margin-bottom: 12px;
  line-height: 1;
}
.empty-state strong { color: var(--text); font-weight: 600; }

/* Reports */
.chart-container {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 12px;
}
.chart-wrap {
  position: relative;
  height: 220px;
}
.tab-toggle {
  display: flex;
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 14px;
  gap: 3px;
}
.tab-toggle button {
  flex: 1;
  padding: 9px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  transition: all 0.2s;
}
.tab-toggle button.active {
  background: var(--surface-2);
  color: var(--text);
}

.category-breakdown {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  margin-bottom: 12px;
}
.breakdown-row {
  display: grid;
  grid-template-columns: 12px 1fr auto auto;
  gap: 12px;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.breakdown-row:last-child { border-bottom: none; }
.breakdown-color { width: 10px; height: 10px; border-radius: 2px; }
.breakdown-name { font-size: 14px; font-weight: 500; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.breakdown-amount { font-family: var(--font-mono); font-size: 13px; font-feature-settings: 'tnum'; }
.breakdown-pct {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  min-width: 46px;
  text-align: right;
  font-feature-settings: 'tnum';
}

/* Settings */
.setting-row {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 6px;
  gap: 12px;
}
.setting-row label { font-size: 14px; font-weight: 500; }
.setting-row select {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 14px;
}

.category-edit-row {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 4px;
  display: grid;
  grid-template-columns: 22px 1fr auto 28px;
  gap: 10px;
  align-items: center;
}
.category-edit-row input[type="color"] {
  width: 22px; height: 22px;
  border: none;
  background: transparent;
  padding: 0;
  cursor: pointer;
  border-radius: 4px;
}
.category-edit-row input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 4px; }
.category-edit-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.category-edit-row input[type="text"] {
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 14px;
  font-weight: 500;
  padding: 4px 0;
  width: 100%;
  min-width: 0;
}
.category-edit-row input[type="text"]:focus {
  outline: none;
  border-bottom: 1px solid var(--accent);
}
.category-edit-row input[type="number"] {
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 5px 8px;
  border-radius: 6px;
  width: 88px;
  text-align: right;
  font-feature-settings: 'tnum';
}
.category-edit-row input[type="number"]:focus { outline: none; border-color: var(--accent); }

.delete-icon {
  color: var(--text-dim);
  font-size: 20px;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 6px;
  transition: all 0.15s;
}
.delete-icon:active { color: var(--expense); background: var(--surface-2); }

.btn {
  padding: 12px 20px;
  background: var(--accent);
  color: var(--bg);
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 14px;
  transition: opacity 0.15s;
  display: inline-block;
  text-align: center;
}
.btn:active { opacity: 0.8; }
.btn.secondary {
  background: var(--surface-2);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn.danger {
  background: transparent;
  color: var(--expense);
  border: 1px solid var(--expense);
}
.btn-full { width: 100%; display: block; }
.btn-group { display: flex; gap: 8px; margin-top: 16px; }
.btn-group .btn { flex: 1; }

/* Modal */
#modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 100;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
}
#modal-overlay[hidden] { display: none; }
.modal {
  background: var(--bg-soft);
  width: 100%;
  max-width: 600px;
  max-height: 92vh;
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(var(--safe-bottom) + 20px);
  overflow-y: auto;
  animation: slideUp 0.25s cubic-bezier(0.2, 0.8, 0.2, 1);
  border-top: 1px solid var(--border);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
}
.modal-title {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  margin: 0;
  font-variation-settings: 'opsz' 36;
}
.close-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  font-size: 26px;
  font-family: var(--font-display);
  line-height: 1;
}

.type-toggle {
  display: flex;
  background: var(--surface);
  border-radius: var(--radius-sm);
  padding: 3px;
  margin-bottom: 16px;
  gap: 3px;
}
.type-toggle button {
  flex: 1;
  padding: 10px;
  border-radius: 6px;
  font-weight: 600;
  color: var(--text-muted);
  font-size: 14px;
  transition: all 0.2s;
}
.type-toggle button[data-type="expense"].active { background: var(--expense); color: white; }
.type-toggle button[data-type="income"].active { background: var(--income); color: white; }

.field { margin-bottom: 14px; }
.field-label {
  display: block;
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
  margin-bottom: 6px;
}
.field input[type="text"],
.field input[type="number"],
.field input[type="date"] {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  font-size: 15px;
}
.field input:focus { outline: none; border-color: var(--accent); }
.amount-input {
  font-family: var(--font-mono) !important;
  font-size: 26px !important;
  font-weight: 500;
  text-align: right;
  padding: 16px !important;
  font-feature-settings: 'tnum';
  letter-spacing: -0.02em;
}

.category-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.cat-chip {
  padding: 11px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  text-align: left;
  display: flex;
  align-items: center;
  gap: 8px;
  transition: all 0.15s;
  color: var(--text);
}
.cat-chip:active { transform: scale(0.97); }
.cat-chip.selected {
  border-color: var(--accent);
  background: var(--accent-soft);
}
.cat-chip-text {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* Toast */
.toast {
  position: fixed;
  bottom: calc(var(--safe-bottom) + 100px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface-2);
  border: 1px solid var(--border);
  padding: 10px 18px;
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 500;
  z-index: 200;
  animation: toastIn 0.3s ease;
  box-shadow: var(--shadow);
}
@keyframes toastIn {
  from { opacity: 0; transform: translate(-50%, 10px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Disable text selection on UI chrome */
header, nav, #fab, .icon-btn, .nav-btn, .tab-toggle, .type-toggle {
  user-select: none;
  -webkit-user-select: none;
}
</style>
</head>
<body>

<div id="app">
  <header id="app-header">
    <div class="month-nav">
      <button class="icon-btn" id="prev-month" aria-label="Poprzedni okres">‹</button>
      <h1 id="current-period">—</h1>
      <button class="icon-btn" id="next-month" aria-label="Następny okres">›</button>
    </div>
  </header>

  <main id="app-main"></main>

  <nav id="bottom-nav">
    <button data-view="dashboard" class="nav-btn active" aria-label="Pulpit">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="8" height="8" rx="1.5"/><rect x="13" y="3" width="8" height="8" rx="1.5"/><rect x="3" y="13" width="8" height="8" rx="1.5"/><rect x="13" y="13" width="8" height="8" rx="1.5"/></svg>
      <span class="nav-label">Pulpit</span>
    </button>
    <button data-view="list" class="nav-btn" aria-label="Lista">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/></svg>
      <span class="nav-label">Lista</span>
    </button>
    <button data-view="reports" class="nav-btn" aria-label="Raporty">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3 A9 9 0 0 1 21 12 L12 12 Z" fill="currentColor" stroke="none"/></svg>
      <span class="nav-label">Raporty</span>
    </button>
    <button data-view="settings" class="nav-btn" aria-label="Ustawienia">
